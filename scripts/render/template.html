<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: letter; margin: 0.7in 0.75in; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica', 'Arial', sans-serif;
    font-size: 11pt; line-height: 1.35; color: #000;
  }
  h1 { font-size: 18pt; text-align: center; margin-bottom: 4pt; }
  h2 {
    font-size: 12pt; text-transform: uppercase;
    border-bottom: 1.5pt solid #000; padding-bottom: 2pt;
    margin: 10pt 0 5pt 0;
  }
  h3 { font-size: 11pt; margin: 6pt 0 2pt 0; }
  p { margin: 3pt 0; }
  ul { margin: 2pt 0 5pt 18pt; list-style: disc; }
  li { margin-bottom: 1pt; display: list-item; }
  a { color: #000; text-decoration: none; }
  .contact { text-align: center; font-size: 10pt; margin-bottom: 10pt; color: #333; }
  .subtitle { font-style: italic; font-size: 10pt; color: #444; }
  .date { font-size: 10pt; color: #444; float: right; }
  .entry { margin-bottom: 3pt; }
  .job-title { font-weight: bold; }
  .job-meta { font-size: 10pt; color: #444; }
  strong { font-weight: bold; }
  em { font-style: italic; }
</style>
</head>
<body>
{{ body_html }}
</body>
</html>
